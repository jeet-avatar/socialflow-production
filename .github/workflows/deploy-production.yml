name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DEPLOY to confirm production deployment"
        required: true

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm deployment
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]; then
            echo "Deployment not confirmed. Input must be exactly 'DEPLOY'."
            exit 1
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: guard
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update ECS service (backend)
        run: |
          aws ecs update-service \
            --cluster socialflow-production \
            --service socialflow-backend \
            --force-new-deployment

      - name: Wait for stability
        run: |
          aws ecs wait services-stable \
            --cluster socialflow-production \
            --services socialflow-backend

      - name: Health check
        run: |
          sleep 10
          curl --fail ${{ secrets.PRODUCTION_URL }}/health || exit 1
