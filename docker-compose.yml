services:
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - path: backend/.env
        required: false
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - REDIS_URL=redis://redis:6379/2
      - SCHEDULER_ENABLED=true
      # App code is at /app/app/ — expose it as root for bare imports (utils.*, routes.*, etc.)
      - PYTHONPATH=/app/app
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  remotion:
    build:
      context: .
      dockerfile: remotion-service/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production

  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A app.worker.celery_app:celery_app worker --loglevel=info --concurrency=2 -Q video
    restart: unless-stopped
    # Override Dockerfile health check — celery worker has no HTTP port
    healthcheck:
      test: ["CMD", "celery", "-A", "app.worker.celery_app:celery_app", "inspect", "ping", "--timeout", "5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    env_file:
      - path: backend/.env
        required: false
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - REDIS_URL=redis://redis:6379/2
      - SCHEDULER_ENABLED=false
      # worker imports use bare 'worker.*' paths — needs /app/app in PYTHONPATH
      - PYTHONPATH=/app/app
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  # ── Flower (Celery monitoring UI) — uncomment to enable ──────────────────
  # flower:
  #   image: mher/flower:2.0
  #   command: celery --broker=redis://redis:6379/0 flower --port=5555
  #   ports:
  #     - "5555:5555"
  #   depends_on:
  #     - redis

volumes:
  mongodb_data:
